    // =====================
    // РЕНДЕР КАРТОЧЕК
    // =====================
    function renderMenu() {
      const container = document.getElementById('menuContent');
      container.innerHTML = MENU.map(cat => `
        <section class="menu-category" id="cat-${cat.id}">
          <h2 class="menu-category__title">${cat.title}</h2>
          <div class="dishes-grid">
            ${cat.dishes.map((dish, i) => `
              <div class="dish-card" onclick="openModal('${cat.id}', ${i})">
                <div class="dish-card__img-wrap">
                  ${dish.img
                    ? `<img src="${dish.img}" alt="${dish.name}" class="dish-card__img" loading="lazy" />`
                    : `<div class="dish-card__img-placeholder"></div>`}
                </div>
                <div class="dish-card__body">
                  <h3 class="dish-card__name">${dish.name}<span class="dish-card__weight-inline">${(() => { const weights = [...new Set(dish.sizes.map(s => s.weight))]; return weights.length === 1 ? weights[0] : weights.join(' / '); })()}</span></h3>
                  <span class="dish-card__price">${(() => { const prices = dish.sizes.map(s => s.price); const min = Math.min(...prices); const max = Math.max(...prices); return (min < max ? 'от ' : '') + min + ' ₽'; })()}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `).join('');
    }

    // =====================
    // МОДАЛЬНОЕ ОКНО
    // =====================
    let currentDish = null;
    let selectedSizeIndex = 0;
    let selectedExtras = new Set();

    function openModal(catId, dishIndex) {
      const cat = MENU.find(c => c.id === catId);
      currentDish = cat.dishes[dishIndex];
      const minPrice = Math.min(...currentDish.sizes.map(s => s.price));
      selectedSizeIndex = currentDish.sizes.findIndex(s => s.price === minPrice);
      selectedExtras = new Set();

      document.getElementById('modalName').textContent = currentDish.name;
      document.getElementById('modalImg').src = currentDish.img || '';
      document.getElementById('modalImg').alt = currentDish.name;
      document.getElementById('modalImg').style.display = currentDish.img ? 'block' : 'none';

      // Размеры
      const sizesEl = document.getElementById('modalSizes');
      const sizeSection = document.getElementById('modalSizeSection');
      const hiddenLabels = ['Стандарт', 'Порция', 'Набор', 'MAX', 'MINI'];
      const showSizes = currentDish.sizes.length > 1 || !hiddenLabels.includes(currentDish.sizes[0].label);
      document.getElementById('modalDesc').textContent = currentDish.desc || '';
      document.querySelector('#modalSizeSection .modal__section-title').childNodes[0].textContent = (currentDish.sizeLabel || 'Размер') + ' ';
      if (!showSizes) {
        sizeSection.style.display = 'none';
      } else {
        sizeSection.style.display = 'block';
        sizesEl.innerHTML = currentDish.sizes.map((s, i) => `
          <button class="modal__option ${i === selectedSizeIndex ? 'modal__option--active' : ''}" data-index="${i}" onclick="selectSize(${i})">
            <span class="modal__option-label">${s.label}</span>
            <span class="modal__option-weight">${s.weight}</span>
            <span class="modal__option-price">${s.price} ₽</span>
          </button>
        `).join('');
      }

      // Добавки
      const extrasEl = document.getElementById('modalExtras');
      const extrasSection = document.getElementById('modalExtrasSection');
      if (currentDish.extras.length === 0) {
        extrasSection.style.display = 'none';
      } else {
        extrasSection.style.display = 'block';
        extrasEl.innerHTML = currentDish.extras.map((e, i) => `
          <button class="modal__extra" data-index="${i}" onclick="toggleExtra(${i})">
            <span class="modal__extra-name">${e.name}</span>
            <span class="modal__extra-price">+${e.price} ₽</span>
          </button>
        `).join('');
      }

      document.getElementById('modalExtrasHint').style.display = currentDish.extras.length > 1 ? 'inline' : 'none';
      updateTotal();
      document.getElementById('modalOverlay').classList.add('modal-overlay--open');
      document.body.style.overflow = 'hidden';
    }

    function selectSize(index) {
      selectedSizeIndex = index;
      document.querySelectorAll('.modal__option').forEach((btn, i) => {
        btn.classList.toggle('modal__option--active', i === index);
      });
      updateTotal();
    }

    function toggleExtra(index) {
      const btn = document.querySelector(`.modal__extra[data-index="${index}"]`);
      if (selectedExtras.has(index)) {
        selectedExtras.delete(index);
        btn.classList.remove('modal__extra--active');
      } else {
        selectedExtras.add(index);
        btn.classList.add('modal__extra--active');
      }
      updateTotal();
    }

    function updateTotal() {
      if (!currentDish) return;
      let total = currentDish.sizes[selectedSizeIndex].price;
      selectedExtras.forEach(i => { total += currentDish.extras[i].price; });
      document.getElementById('modalTotal').textContent = total + ' ₽';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('modal-overlay--open');
      document.body.style.overflow = '';
      currentDish = null;
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('modalOrderBtn').addEventListener('click', () => {
      window.open('https://chibbis.ru/minusinsk/restaurant/byli-tut/menu', '_blank');
    });

    // =====================
    // НАВИГАЦИЯ
    // =====================
    renderMenu();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id.replace('cat-', '');
          document.querySelectorAll('.menu-tab').forEach(t => t.classList.toggle('menu-tab--active', t.dataset.category === id));
        }
      });
    }, { threshold: 0.25 });

    document.querySelectorAll('.menu-category').forEach(c => observer.observe(c));

    const burgerBtn = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    burgerBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
      burgerBtn.classList.toggle('open');
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        burgerBtn.classList.remove('open');
      });
    });

    const tabs = document.querySelectorAll('.menu-tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('menu-tab--active'));
        tab.classList.add('menu-tab--active');
        const cat = tab.dataset.category;
        const section = document.getElementById('cat-' + cat);
        if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    window.addEventListener('load', () => {
      const hash = window.location.hash;
      if (hash) {
        const target = document.querySelector(hash);
        if (target) {
          setTimeout(() => {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            const id = hash.replace('#cat-', '');
            tabs.forEach(t => t.classList.toggle('menu-tab--active', t.dataset.category === id));
          }, 100);
        }
      }
    });

  </script>
</body>
</html>
